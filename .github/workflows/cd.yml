name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # ── Deploy — push images, migrate, deploy to Cloud Run ──────────────────────
  deploy:
    # Only run if CI passed — never deploy a broken build
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    env:
      # Use the SHA of the commit that triggered CI, not the CD runner's HEAD
      SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      # Check out the exact commit that CI verified
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push API image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/api:${{ env.SHA }}"
          docker build -f apps/api/Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Build and push Web image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/web:${{ env.SHA }}"
          docker build -f apps/web/Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Run database migrations
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/api:${{ env.SHA }}"
          gcloud run jobs create checkout-migrate-${{ github.run_number }} \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --set-secrets DATABASE_URL=checkout-database-url:latest,DIRECT_URL=checkout-direct-url:latest \
            --command "pnpm" \
            --args "--filter,@checkout/api,exec,prisma,migrate,deploy" \
            --execute-now \
            --wait \
            --delete-on-job-completion || true

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy checkout-api \
            --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/api:${{ env.SHA }}" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy checkout-web \
            --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/web:${{ env.SHA }}" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed
