name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Detect which apps changed so we only deploy what's necessary
jobs:
  changes:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        run: |
          git diff --name-only HEAD~1 HEAD > changed.txt
          cat changed.txt
          echo "api=$(grep -qE '^apps/api/|^prisma/|^\.github/' changed.txt && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "web=$(grep -qE '^apps/web/|^\.github/' changed.txt && echo true || echo false)" >> $GITHUB_OUTPUT

  # ── API — build, migrate, deploy ─────────────────────────────────────────────
  deploy-api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      SHA: ${{ github.event.workflow_run.head_sha }}
      REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push API image
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ env.SHA }}"
          docker build -f apps/api/Dockerfile -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE "${{ env.REGISTRY }}/api:latest"
          docker push "${{ env.REGISTRY }}/api:latest"

      # Migrations run BEFORE deploy — a failed migration blocks the deploy
      - name: Run database migrations
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ env.SHA }}"
          gcloud run jobs delete checkout-migrate-${{ github.run_number }} --region ${{ secrets.GCP_REGION }} --quiet || true
          gcloud run jobs create checkout-migrate-${{ github.run_number }} \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --set-secrets "DATABASE_URL=checkout-database-url:latest,DIRECT_URL=checkout-direct-url:latest" \
            --command "node" \
            --args "apps/api/node_modules/prisma/build/index.js,migrate,deploy,--schema,apps/api/prisma/schema.prisma" \
            --execute-now \
            --wait
          gcloud run jobs delete checkout-migrate-${{ github.run_number }} \
            --region ${{ secrets.GCP_REGION }} \
            --quiet

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy checkout-api \
            --image "${{ env.REGISTRY }}/api:${{ env.SHA }}" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "DATABASE_URL=checkout-database-url:latest,JWT_SECRET=checkout-jwt-secret:latest" \
            --set-env-vars "DB_PROVIDER=postgres,AUTH_PROVIDER=jwt,DB_SSL=true,SHELL_ORIGIN=${{ secrets.WEB_URL }}"

  # ── Web — build and deploy ────────────────────────────────────────────────────
  deploy-web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      SHA: ${{ github.event.workflow_run.head_sha }}
      REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Web image
        run: |
          IMAGE="${{ env.REGISTRY }}/web:${{ env.SHA }}"
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE "${{ env.REGISTRY }}/web:latest"
          docker push "${{ env.REGISTRY }}/web:latest"

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy checkout-web \
            --image "${{ env.REGISTRY }}/web:${{ env.SHA }}" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production"
