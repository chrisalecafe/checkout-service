name: CI

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.13.1"

jobs:
  # ── 1. Install + generate ────────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # postinstall in apps/api/package.json runs `prisma generate` automatically.
      # The generated client lands inside node_modules and is captured by the cache below.
      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Re-run install as a fallback if cache missed; postinstall re-generates the client.
      - run: pnpm install --frozen-lockfile

      - name: Type-check API
        run: pnpm --filter @checkout/api exec tsc -p tsconfig.build.json --noEmit

  # ── 3. Test — must pass before build ────────────────────────────────────────
  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      # Re-run install as a fallback if cache missed; postinstall re-generates the client.
      - run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm --filter @checkout/api test
        env:
          JWT_SECRET: ci-test-secret-32-chars-minimum!!

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @checkout/api build
        env:
          DATABASE_URL: postgresql://noop:noop@localhost:5432/noop
          DIRECT_URL: postgresql://noop:noop@localhost:5432/noop

      - name: Build Web
        run: pnpm --filter @checkout/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ── 5. Docker build + smoke test ────────────────────────────────────────────
  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: checkout-api:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — API health
        run: |
          docker run -d \
            --name api-smoke \
            -p 4000:4000 \
            -e DATABASE_URL="postgresql://noop:noop@localhost:5432/noop" \
            -e JWT_SECRET="ci-smoke-test-secret-32-chars-min!" \
            -e AUTH_PROVIDER="mock" \
            -e DB_PROVIDER="mock" \
            -e PORT="4000" \
            -e NODE_ENV="test" \
            checkout-api:ci
          # Wait for the container to be ready, retrying on connection refused too
          curl --retry 15 --retry-delay 2 --retry-connrefused --fail http://localhost:4000/health || \
            (docker logs api-smoke && exit 1)
          docker stop api-smoke
