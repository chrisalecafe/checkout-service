name: CI

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.13.1"

jobs:
  # ── 1. Install ──────────────────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

  # ── 2. Lint ─────────────────────────────────────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @checkout/api exec tsc -p tsconfig.build.json --noEmit

  # ── 3. Test — must pass before build ────────────────────────────────────────
  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm --filter @checkout/api test
        env:
          JWT_SECRET: ci-test-secret-32-chars-minimum!!

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @checkout/api build
        env:
          DATABASE_URL: postgresql://noop:noop@localhost:5432/noop

      - name: Build Web
        run: pnpm --filter @checkout/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ── 5. Docker build + smoke test ────────────────────────────────────────────
  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: checkout-api:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — API health
        run: |
          docker run -d \
            --name api-smoke \
            -p 4000:4000 \
            -e DATABASE_URL="postgresql://noop:noop@localhost:5432/noop" \
            -e JWT_SECRET="ci-smoke-test-secret-32-chars-min!" \
            -e AUTH_PROVIDER="mock" \
            -e DB_PROVIDER="mock" \
            -e PORT="4000" \
            -e NODE_ENV="test" \
            checkout-api:ci
          sleep 10
          curl --retry 5 --retry-delay 2 --fail http://localhost:4000/health
          docker stop api-smoke

  # ── 6. Deploy — main branch only ────────────────────────────────────────────
  deploy:
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push API image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/api:${{ github.sha }}"
          docker build -f apps/api/Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Build and push Web image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/web:${{ github.sha }}"
          docker build -f apps/web/Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Run database migrations
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/api:${{ github.sha }}"
          gcloud run jobs create checkout-migrate-${{ github.run_number }} \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --set-secrets DATABASE_URL=checkout-database-url:latest,DIRECT_URL=checkout-direct-url:latest \
            --command "pnpm" \
            --args "--filter,@checkout/api,exec,prisma,migrate,deploy" \
            --execute-now \
            --wait \
            --delete-on-job-completion || true

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy checkout-api \
            --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/api:${{ github.sha }}" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy checkout-web \
            --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/checkout/web:${{ github.sha }}" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed
